services:
  weather-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-weather-bot
    restart: unless-stopped
    env_file:
      - .env
    # For 64-bit Raspberry Pi OS (recommended), keep arm64.
    # For 32-bit Pi OS, change to: linux/arm/v7
    platform: linux/arm64
